<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Penguin</title>

  <style>
    :root {
      --penguin-size: 200px;
      --penguin-skin: black;
      --penguin-belly: white;
      --penguin-beak: orange;
    }

    @media (max-width: 350px) {
      :root {
        --penguin-size: 150px;
        --penguin-skin: black;
      }
    }

    body {
      background:#c6faf1;
    }

    .penguin {
      position: relative;
      margin: auto;
      display: block;
      margin-top: 5%;
      width: var(--penguin-size);
      height: var(--penguin-size);
    }

    .penguin * {
      position: absolute;
    }

    /* (todo tu resto de CSS déjalo igual desde aquí) */
  </style>
</head>

<body>

<div class="penguin">
  <!-- todo tu HTML del pingüino aquí -->
</div>

</body>
</html>
